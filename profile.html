<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - 横井のページ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">My travel life</div>
        <nav class="nav">
            <ul>
                <li><a href="index.html">Home</a></li>
             </ul>
        </nav>
    </header>

    <main style="padding: 40px; max-width: 800px; margin: 0 auto; line-height: 1.8;">
        <h1 style="border-bottom: 2px solid #ccc; padding-bottom: 10px;">Profile</h1>
        
       <section style="margin-top: 50px;">
        <h3 style="color: #005086; border-left: 5px solid #005086; padding-left: 15px; margin-bottom: 30px;">Travel History</h3>
        
        <div class="timeline">
            <div class="timeline-item">
                <div class="timeline-date">2024</div>
                <div class="timeline-content">
                    <h4>国内旅行：北海道</h4>
                    <p>美味しい海鮮を求めて。ドライブで広大な景色を楽しみました。</p>
                </div>
            </div>

            <div class="timeline-item">
                <div class="timeline-date">2023</div>
                <div class="timeline-content">
                    <h4>沖縄：宮古島</h4>
                    <p>とにかく海が綺麗！「宮古ブルー」に癒された最高の旅でした。</p>
                </div>
            </div>

            <div class="timeline-item">
                <div class="timeline-date">Before 2020</div>
                <div class="timeline-content">
                    <h4>海外旅行：ハワイ・グアム</h4>
                    <p>飛行機に乗るワクワク感！また海外へ自由に行ける日を楽しみにしています。</p>
                </div>
            </div>

            <div class="timeline-item">
                <div class="timeline-date">Memory</div>
                <div class="timeline-content">
                    <h4>ディズニーリゾート</h4>
                    <p>ここは毎年欠かせない場所。パレードとビールはセットです。</p>
                </div>
            </div>
        </div>
    </section>
    </main>
</body>
</html>
