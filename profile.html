<!DOCTYPE html>
<html lang="ja">
<head>

<body>
    <header class="header">
        <div class="logo">My travel life</div>
        <nav class="nav">
            <ul>
                <li><a href="index.html">Home</a></li>
             </ul>

    <main style="padding: 40px; max-width: 800px; margin: 0 auto; line-height: 1.8;">
        <h1 style="border-bottom: 2px solid #ccc; padding-bottom: 10px;">Profile</h1>
        
        <section style="margin-top: 30px; text-align: left;">
            <p>旅行が大好きです。車を運転することも好きですが、特に<strong>飛行機に乗ること</strong>が大好きです。</p>
            <p>コロナ前はよく海外にも足を運んでいました。海が好きなので、旅行先は海のある場所ばかり選んでしまいます。</p>
            <p>また、東京ディズニーリゾートも大切な場所です。パーク内でビールを飲みながらのんびり散歩したり、パレードを眺めたりする時間に幸せを感じます。</p>
        </section>

        <section style="margin-top: 40px; padding: 20px; background-color: #f9f9f9; border-radius: 10px;">
            <h3>Favorite Things</h3>
            <ul style="list-style: none; padding: 0;">
                <li>✈️ 飛行機の旅（空からの景色）</li>
                <li>🌊 海辺でのドライブ</li>
                <li>🍺 ディズニーでのんびりビール</li>
            </ul>
        </section>
